<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexsharp-ultra-ai | Pro Enhancer</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Sora', sans-serif;
            background-color: #030303;
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030303 80%);
        }
        .premium-font { font-family: 'Space Grotesk', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-btn {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transition: 0.3s ease;
        }
        .glow-btn:hover { box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header / Navbar -->
    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="premium-font text-2xl font-bold tracking-tight">
            <span class="text-white">NEX</span><span class="text-purple-500">SHARP</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-xs text-zinc-500 font-bold uppercase tracking-widest hover:text-white transition">Templates</button>
            <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center text-[10px] font-bold cursor-pointer">NS</div>
        </div>
    </nav>

    <!-- Main Section -->
    <main class="flex flex-col items-center justify-center pt-20 px-4 text-center">
        <h1 class="premium-font text-5xl md:text-7xl font-bold mb-6 tracking-tighter leading-none">
            Nexsharp <span class="bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent italic">Ultra AI</span>
        </h1>
        <p class="text-zinc-500 max-w-md mb-12 text-sm font-medium">
            AI-powered image and video enhancement. Restore details, upscale quality, and bring your visuals to life.
        </p>

        <!-- Premium Upload Box -->
        <div id="drop-zone" class="glass w-full max-w-3xl h-72 rounded-[2.5rem] flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 hover:border-purple-500/50 transition-all cursor-pointer group">
            <div class="w-16 h-16 bg-zinc-900 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <p class="text-zinc-300 font-semibold">Drop your media or <span class="text-purple-400">Browse</span></p>
            <p class="text-[10px] text-zinc-600 mt-2 tracking-widest uppercase font-bold">Video • Image • RAW</p>
            <input type="file" id="file-input" class="hidden" accept="image/*,video/*">
        </div>

        <!-- Enhance Button (Hidden initially) -->
        <div id="action-container" class="hidden mt-8 w-full max-w-xs">
            <button class="glow-btn w-full bg-purple-600 text-white py-4 rounded-2xl font-bold text-sm tracking-widest uppercase">
                Enhance with Ultra AI
            </button>
        </div>
    </main>

    <!-- Creator Footer -->
    <footer class="mt-32 pb-12 text-center">
        <div class="inline-block px-4 py-1 rounded-full border border-zinc-800 text-[10px] text-zinc-500 font-bold tracking-[0.4em] uppercase">
            Developed by <span class="text-white">Nexsharp-ultra-ai</span>
        </div>
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const actionContainer = document.getElementById('action-container');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                actionContainer.classList.remove('hidden');
                console.log("File detected:", e.target.files[0].name);
            }
        };
    </script>
</body>
</html>
